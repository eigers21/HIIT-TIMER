<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HIIT タイマー</title>
<style>
/* ==================== リセット・ベーススタイル ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: #121212; color: #fff;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ==================== Wake Lock 警告バナー ==================== */
#wake-lock-warning {
  display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: #fff; text-align: center; padding: 10px 16px; font-size: 13px;
  font-weight: 600; letter-spacing: 0.3px;
  box-shadow: 0 2px 12px rgba(211,84,0,0.4);
}
#wake-lock-warning.show { display: block; }

/* ==================== ヘッダー ==================== */
.app-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 8px;
}
.app-title {
  font-size: 18px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, #FF4757, #FFA502, #2ED573, #4A90D9, #A55EEA);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.settings-btn {
  width: 44px; height: 44px; border: none; background: rgba(255,255,255,0.08);
  border-radius: 12px; color: #fff; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
}
.settings-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.92); }

/* ==================== メイン画面 ==================== */
.main-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8px 20px 20px;
  min-height: calc(100vh - 70px);
}

/* フェーズ名 */
.phase-name {
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  margin-bottom: 12px; text-align: center;
  transition: color 0.4s ease;
  text-shadow: 0 0 20px var(--phase-color-alpha, rgba(74,144,217,0.5));
}

/* SVGサークル */
.timer-circle-wrap {
  position: relative; width: 280px; height: 280px; margin: 0 auto;
}
.timer-circle-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.circle-bg { fill: none; stroke: #2A2A2A; stroke-width: 14; }
.circle-progress {
  fill: none; stroke-width: 14; stroke-linecap: round;
  transition: stroke-dashoffset 0.6s linear, stroke 0.4s ease;
  filter: drop-shadow(0 0 8px var(--phase-color-alpha, rgba(74,144,217,0.4)));
}
.timer-center {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.timer-time {
  font-size: 84px; font-weight: 200; letter-spacing: 2px;
  font-variant-numeric: tabular-nums; line-height: 1;
}
.timer-total {
  font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 6px;
  font-variant-numeric: tabular-nums;
}

/* ループ情報 */
.loop-info {
  font-size: 15px; color: rgba(255,255,255,0.5); margin-top: 14px;
  min-height: 22px; text-align: center; font-weight: 500;
}

/* コントロールボタン */
.controls {
  display: flex; gap: 16px; margin-top: 28px; justify-content: center;
  flex-wrap: wrap;
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 32px; border: none; border-radius: 16px;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
  letter-spacing: 0.5px;
}
.ctrl-btn:active { transform: scale(0.94); }
.btn-start {
  background: linear-gradient(135deg, #2ED573, #1abc9c); color: #fff;
  box-shadow: 0 4px 20px rgba(46,213,115,0.35);
}
.btn-pause {
  background: linear-gradient(135deg, #FFA502, #e67e22); color: #fff;
  box-shadow: 0 4px 20px rgba(255,165,2,0.35);
}
.btn-resume {
  background: linear-gradient(135deg, #2ED573, #1abc9c); color: #fff;
  box-shadow: 0 4px 20px rgba(46,213,115,0.35);
}
.btn-reset {
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
}
.btn-reset:active { background: rgba(255,255,255,0.18); }

/* 全体進捗バー */
.overall-progress {
  width: 100%; max-width: 340px; margin-top: 32px;
}
.progress-bar-bg {
  width: 100%; height: 6px; background: #2A2A2A; border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.6s linear, background-color 0.4s ease;
  width: 0%;
}
.progress-label {
  display: flex; justify-content: space-between; margin-top: 6px;
  font-size: 12px; color: rgba(255,255,255,0.35);
  font-variant-numeric: tabular-nums;
}

/* 完了画面 */
.complete-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(18,18,18,0.95);
  flex-direction: column; align-items: center; justify-content: center;
}
.complete-overlay.show { display: flex; }
.complete-icon { font-size: 80px; margin-bottom: 20px; }
.complete-text {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #2ED573, #4A90D9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 32px;
}

/* ==================== 設定画面 ==================== */
.settings-overlay {
  display: none; position: fixed; inset: 0; z-index: 80;
  background: #121212; overflow-y: auto;
  padding-bottom: 100px;
}
.settings-overlay.show { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.settings-header {
  display: flex; align-items: center; padding: 16px 20px;
  position: sticky; top: 0; background: rgba(18,18,18,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.back-btn {
  width: 40px; height: 40px; border: none; background: rgba(255,255,255,0.08);
  border-radius: 10px; color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.back-btn:active { background: rgba(255,255,255,0.15); }
.settings-title { font-size: 18px; font-weight: 700; margin-left: 14px; }
.settings-body { padding: 16px 16px 40px; }

/* ブロックカード */
.block-card {
  background: #1E1E1E; border-radius: 16px; padding: 16px;
  margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06);
}
.block-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.block-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); }
.block-loop-wrap {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: rgba(255,255,255,0.5);
}
.block-loop-wrap input[type="number"] {
  width: 56px; background: #2A2A2A; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: #fff; text-align: center; padding: 6px;
  font-size: 14px;
}
.block-delete {
  width: 36px; height: 36px; border: none; background: rgba(255,77,77,0.12);
  border-radius: 10px; color: #FF4757; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.block-delete:active { background: rgba(255,77,77,0.25); }

/* フェーズカード */
.phase-card {
  background: #252525; border-radius: 12px; padding: 14px;
  margin-bottom: 10px; border-left: 3px solid var(--pc, #4A90D9);
}
.phase-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  flex-wrap: wrap;
}
.phase-row:last-child { margin-bottom: 0; }
.phase-row label {
  font-size: 12px; color: rgba(255,255,255,0.45); min-width: 44px;
  flex-shrink: 0;
}
.phase-row input[type="text"], .phase-row input[type="number"] {
  flex: 1; min-width: 0; background: #1E1E1E;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: #fff; padding: 8px 10px; font-size: 14px;
}
.phase-row input[type="color"] {
  width: 36px; height: 36px; border: none; border-radius: 8px;
  cursor: pointer; background: transparent; padding: 0;
}
.phase-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
.phase-row input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: none; }
.duration-display {
  font-size: 12px; color: rgba(255,255,255,0.35); min-width: 48px;
}
.phase-audio-row {
  display: flex; align-items: center; gap: 8px; margin-top: 6px;
}
.audio-upload-btn {
  background: rgba(255,255,255,0.08); border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 8px; color: rgba(255,255,255,0.5); padding: 6px 12px;
  font-size: 12px; cursor: pointer; white-space: nowrap;
}
.audio-upload-btn:active { background: rgba(255,255,255,0.14); }
.audio-file-name {
  font-size: 11px; color: rgba(255,255,255,0.35);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.phase-delete {
  width: 30px; height: 30px; border: none; background: rgba(255,77,77,0.1);
  border-radius: 8px; color: #FF4757; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.add-phase-btn, .add-block-btn, .reset-default-btn {
  width: 100%; padding: 10px; border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 10px; background: transparent; color: rgba(255,255,255,0.4);
  font-size: 13px; cursor: pointer; margin-top: 8px;
  transition: background 0.2s;
}
.add-phase-btn:active, .add-block-btn:active { background: rgba(255,255,255,0.06); }
.add-block-btn { margin-top: 14px; border-color: rgba(255,255,255,0.08); }
.reset-default-btn {
  margin-top: 10px; border-style: solid;
  border-color: rgba(255,165,2,0.3); color: #FFA502;
}

/* ==================== アニメーション ==================== */
@keyframes pulse-glow {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.running .circle-progress { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- Wake Lock非対応警告 -->
<div id="wake-lock-warning">⚠ このブラウザはWake Lock APIに非対応です。画面が消灯する可能性があります。</div>

<!-- ヘッダー -->
<div class="app-header">
  <div class="app-title">HIIT TIMER</div>
  <button class="settings-btn" id="openSettingsBtn" aria-label="設定">⚙</button>
</div>

<!-- メイン画面 -->
<div class="main-screen" id="mainScreen">
  <div class="phase-name" id="phaseName">準備</div>

  <div class="timer-circle-wrap" id="circleWrap">
    <svg viewBox="0 0 280 280">
      <circle class="circle-bg" cx="140" cy="140" r="120" />
      <circle class="circle-progress" id="circleProgress"
        cx="140" cy="140" r="120"
        stroke-dasharray="753.98" stroke-dashoffset="0" />
    </svg>
    <div class="timer-center">
      <div class="timer-time" id="timerTime">01:00</div>
      <div class="timer-total" id="timerTotal"></div>
    </div>
  </div>

  <div class="loop-info" id="loopInfo"></div>

  <div class="controls" id="controls">
    <button class="ctrl-btn btn-start" id="btnStart">▶ スタート</button>
  </div>

  <div class="overall-progress" id="overallProgress">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label">
      <span id="progressPhaseNum">0 / 0</span>
      <span id="progressTimeLeft">00:00</span>
    </div>
  </div>
</div>

<!-- 完了画面 -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-icon">🎉</div>
  <div class="complete-text">お疲れさまでした！</div>
  <button class="ctrl-btn btn-start" id="btnCompleteReset">↺ リセット</button>
</div>

<!-- 設定画面 -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-header">
    <button class="back-btn" id="closeSettingsBtn">←</button>
    <div class="settings-title">プログラム設定</div>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<script>
/* ==================== 定数 ==================== */
const CIRCUMFERENCE = 2 * Math.PI * 120; // ≈ 753.98

/* ==================== デフォルトプログラム ==================== */
function getDefaultBlocks() {
  return [
    { loop: 1, phases: [{ name: '準備', duration: 60, color: '#4A90D9' }] },
    { loop: 4, phases: [
      { name: 'HIIT', duration: 240, color: '#FF4757' },
      { name: '休憩', duration: 180, color: '#2ED573' },
    ]},
    { loop: 1, phases: [{ name: 'ストレッチ', duration: 120, color: '#FFA502' }] },
    { loop: 1, phases: [{ name: '瞑想', duration: 300, color: '#A55EEA' }] },
  ];
}

/* ==================== 状態管理 ==================== */
const state = {
  blocks: [],          // プログラム定義
  flatPhases: [],      // 展開済みフェーズリスト
  currentIndex: 0,     // 現在のフェーズインデックス
  timeRemaining: 0,    // 残り秒数
  isRunning: false,
  isPaused: false,
  intervalId: null,
  phaseStartTime: 0,   // タイマー精度用
  phaseInitRemaining: 0,
  audioCtx: null,
  currentSource: null,
  currentGain: null,
  audioBuffers: {},    // "blockIdx-phaseIdx" → AudioBuffer
  audioFileNames: {},  // "blockIdx-phaseIdx" → ファイル名
  audioPlayStart: 0,
  audioPlayOffset: 0,
  currentAudioKey: null,
  wakeLock: null,
  spokenSeconds: new Set(), // カウントダウン二重発話防止
};

/* ==================== localStorage ==================== */
function saveProgram() {
  const data = state.blocks.map(b => ({
    loop: b.loop,
    phases: b.phases.map(p => ({ name: p.name, duration: p.duration, color: p.color })),
  }));
  localStorage.setItem('hiit-program', JSON.stringify(data));
}

function loadProgram() {
  try {
    const raw = localStorage.getItem('hiit-program');
    if (!raw) return getDefaultBlocks();
    return JSON.parse(raw);
  } catch { return getDefaultBlocks(); }
}

/* ==================== プログラム展開 ==================== */
function flattenBlocks(blocks) {
  const flat = [];
  blocks.forEach((block, bi) => {
    for (let l = 0; l < block.loop; l++) {
      block.phases.forEach((phase, pi) => {
        if (phase.duration <= 0) return; // 0秒フェーズはスキップ
        flat.push({
          name: phase.name,
          duration: phase.duration,
          color: phase.color,
          blockIdx: bi,
          phaseIdx: pi,
          loopIndex: l,
          totalLoops: block.loop,
          audioKey: bi + '-' + pi,
        });
      });
    }
  });
  return flat;
}

/* ==================== タイマーロジック ==================== */
function startTimer() {
  if (state.flatPhases.length === 0) return;
  ensureAudioCtx();
  state.isRunning = true;
  state.isPaused = false;
  state.currentIndex = 0;
  state.spokenSeconds.clear();
  requestWakeLock();
  beginPhase(0);
}

function beginPhase(index) {
  if (index >= state.flatPhases.length) { finishProgram(); return; }
  state.currentIndex = index;
  const phase = state.flatPhases[index];
  state.timeRemaining = phase.duration;
  state.phaseStartTime = Date.now();
  state.phaseInitRemaining = phase.duration;
  state.spokenSeconds.clear();
  updateThemeColor(phase.color);
  updateDisplay();
  // BGM切り替え
  playPhaseAudio(phase.audioKey);
  // タイマー開始
  clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, 200);
  document.getElementById('circleWrap').classList.add('running');
}

function tick() {
  const elapsed = (Date.now() - state.phaseStartTime) / 1000;
  const remaining = Math.max(0, Math.ceil(state.phaseInitRemaining - elapsed));
  if (remaining !== state.timeRemaining) {
    state.timeRemaining = remaining;
    updateDisplay();
    checkCountdown(remaining);
  }
  if (remaining <= 0) {
    clearInterval(state.intervalId);
    // 次のフェーズへ
    beginPhase(state.currentIndex + 1);
  }
}

function pauseTimer() {
  if (!state.isRunning) return;
  clearInterval(state.intervalId);
  state.isPaused = true;
  state.isRunning = false;
  // 残り時間を精密に保持
  const elapsed = (Date.now() - state.phaseStartTime) / 1000;
  state.timeRemaining = Math.max(0, Math.ceil(state.phaseInitRemaining - elapsed));
  pausePhaseAudio();
  document.getElementById('circleWrap').classList.remove('running');
  updateControls();
}

function resumeTimer() {
  state.isRunning = true;
  state.isPaused = false;
  state.phaseStartTime = Date.now();
  state.phaseInitRemaining = state.timeRemaining;
  state.spokenSeconds.clear();
  state.intervalId = setInterval(tick, 200);
  resumePhaseAudio();
  requestWakeLock();
  document.getElementById('circleWrap').classList.add('running');
  updateControls();
}

function resetTimer() {
  clearInterval(state.intervalId);
  state.isRunning = false;
  state.isPaused = false;
  state.currentIndex = 0;
  stopPhaseAudio();
  releaseWakeLock();
  speechSynthesis.cancel();
  document.getElementById('circleWrap').classList.remove('running');
  document.getElementById('completeOverlay').classList.remove('show');
  if (state.flatPhases.length > 0) {
    state.timeRemaining = state.flatPhases[0].duration;
    updateThemeColor(state.flatPhases[0].color);
  } else {
    state.timeRemaining = 0;
  }
  updateDisplay();
  updateControls();
}

function finishProgram() {
  state.isRunning = false;
  state.isPaused = false;
  stopPhaseAudio();
  releaseWakeLock();
  clearInterval(state.intervalId);
  document.getElementById('circleWrap').classList.remove('running');
  document.getElementById('completeOverlay').classList.add('show');
}

/* ==================== 音声カウントダウン ==================== */
function checkCountdown(remaining) {
  // フェーズの最後のフェーズでは「スタート」の代わりに「終了」
  const isLast = state.currentIndex >= state.flatPhases.length - 1;
  const map = { 4: '3', 3: '2', 2: '1', 1: isLast ? '終了' : 'スタート' };
  if (map[remaining] && !state.spokenSeconds.has(remaining)) {
    state.spokenSeconds.add(remaining);
    speak(map[remaining]);
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 1.0;
  utter.volume = 1.0;
  const voices = speechSynthesis.getVoices();
  const ja = voices.find(v => v.lang && v.lang.startsWith('ja'));
  if (ja) utter.voice = ja;

  // BGM音量を一時的に下げる（ダッキング）
  if (state.currentGain && state.audioCtx) {
    state.currentGain.gain.setTargetAtTime(0.1, state.audioCtx.currentTime, 0.1);
  }
  utter.onend = () => {
    if (state.currentGain && state.isRunning && state.audioCtx) {
      state.currentGain.gain.setTargetAtTime(0.4, state.audioCtx.currentTime, 0.3);
    }
  };

  speechSynthesis.speak(utter);
}

/* ==================== Web Audio API ==================== */
function ensureAudioCtx() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
}

async function loadAudioFile(file, key) {
  ensureAudioCtx();
  try {
    const buf = await file.arrayBuffer();
    state.audioBuffers[key] = await state.audioCtx.decodeAudioData(buf);
    state.audioFileNames[key] = file.name;
  } catch (e) {
    console.warn('音声ファイル読み込みエラー:', e);
  }
}

function playPhaseAudio(key) {
  stopPhaseAudio();
  if (!state.audioBuffers[key]) return;
  ensureAudioCtx();
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.audioBuffers[key];
  src.loop = true;
  const gain = state.audioCtx.createGain();
  gain.gain.value = 0.4;
  src.connect(gain);
  gain.connect(state.audioCtx.destination);
  state.audioPlayStart = state.audioCtx.currentTime;
  state.audioPlayOffset = 0;
  state.currentAudioKey = key;
  state.currentSource = src;
  state.currentGain = gain;
  src.start(0, 0);
}

function pausePhaseAudio() {
  if (!state.currentSource || !state.audioCtx) return;
  const elapsed = state.audioCtx.currentTime - state.audioPlayStart + state.audioPlayOffset;
  const dur = state.currentSource.buffer.duration;
  state.audioPlayOffset = dur > 0 ? elapsed % dur : 0;
  try { state.currentSource.stop(); } catch {}
  state.currentSource = null;
}

function resumePhaseAudio() {
  if (!state.currentAudioKey || !state.audioBuffers[state.currentAudioKey]) return;
  ensureAudioCtx();
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.audioBuffers[state.currentAudioKey];
  src.loop = true;
  const gain = state.audioCtx.createGain();
  gain.gain.value = 0.4;
  src.connect(gain);
  gain.connect(state.audioCtx.destination);
  state.audioPlayStart = state.audioCtx.currentTime;
  state.currentSource = src;
  state.currentGain = gain;
  src.start(0, state.audioPlayOffset);
}

function stopPhaseAudio() {
  if (state.currentSource) {
    try { state.currentSource.stop(); } catch {}
    state.currentSource = null;
  }
  state.currentGain = null;
  state.currentAudioKey = null;
  state.audioPlayOffset = 0;
}

/* ==================== Wake Lock ==================== */
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    state.wakeLock = await navigator.wakeLock.request('screen');
    state.wakeLock.addEventListener('release', () => { state.wakeLock = null; });
  } catch {}
}

function releaseWakeLock() {
  if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
}

/* ==================== UI更新 ==================== */
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateThemeColor(color) {
  const root = document.documentElement;
  root.style.setProperty('--phase-color', color);
  // アルファ付きカラーを生成
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  root.style.setProperty('--phase-color-alpha', `rgba(${r},${g},${b},0.45)`);
  document.getElementById('phaseName').style.color = color;
  document.getElementById('circleProgress').setAttribute('stroke', color);
  document.getElementById('progressFill').style.backgroundColor = color;
}

function updateDisplay() {
  const phases = state.flatPhases;
  if (phases.length === 0) {
    document.getElementById('timerTime').textContent = '--:--';
    document.getElementById('phaseName').textContent = 'フェーズなし';
    document.getElementById('loopInfo').textContent = '';
    return;
  }
  const phase = phases[state.currentIndex] || phases[0];
  // 時間表示
  document.getElementById('timerTime').textContent = formatTime(state.timeRemaining);
  // フェーズ名
  document.getElementById('phaseName').textContent = phase.name;
  // ループ情報
  if (phase.totalLoops > 1) {
    document.getElementById('loopInfo').textContent =
      phase.name + ' ' + (phase.loopIndex + 1) + '/' + phase.totalLoops + '回目';
  } else {
    document.getElementById('loopInfo').textContent = '';
  }
  // サークル進捗
  const progress = 1 - (state.timeRemaining / phase.duration);
  const offset = CIRCUMFERENCE * progress;
  document.getElementById('circleProgress').setAttribute('stroke-dashoffset', offset);
  // 全体進捗
  updateOverallProgress();
  // コントロール
  updateControls();
}

function updateOverallProgress() {
  const phases = state.flatPhases;
  if (phases.length === 0) return;
  const totalTime = phases.reduce((s, p) => s + p.duration, 0);
  let elapsed = 0;
  for (let i = 0; i < state.currentIndex; i++) elapsed += phases[i].duration;
  const curPhase = phases[state.currentIndex];
  if (curPhase) elapsed += (curPhase.duration - state.timeRemaining);
  const pct = totalTime > 0 ? (elapsed / totalTime) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPhaseNum').textContent =
    (state.currentIndex + 1) + ' / ' + phases.length + ' フェーズ';
  const totalRemain = totalTime - elapsed;
  document.getElementById('progressTimeLeft').textContent = '残り ' + formatTime(Math.max(0, Math.ceil(totalRemain)));
  document.getElementById('timerTotal').textContent = '全体 ' + formatTime(totalTime);
}

function updateControls() {
  const controls = document.getElementById('controls');
  if (!state.isRunning && !state.isPaused) {
    controls.innerHTML =
      '<button class="ctrl-btn btn-start" onclick="startTimer()">▶ スタート</button>';
  } else if (state.isRunning) {
    controls.innerHTML =
      '<button class="ctrl-btn btn-pause" onclick="pauseTimer()">⏸ 一時停止</button>' +
      '<button class="ctrl-btn btn-reset" onclick="resetTimer()">↺ リセット</button>';
  } else if (state.isPaused) {
    controls.innerHTML =
      '<button class="ctrl-btn btn-resume" onclick="resumeTimer()">▶ 再開</button>' +
      '<button class="ctrl-btn btn-reset" onclick="resetTimer()">↺ リセット</button>';
  }
}

/* ==================== 設定画面 ==================== */
function openSettings() {
  if (state.isRunning || state.isPaused) {
    if (!confirm('タイマーをリセットして設定画面を開きますか？')) return;
    resetTimer();
  }
  renderSettings();
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
  rebuildProgram();
}

function rebuildProgram() {
  state.flatPhases = flattenBlocks(state.blocks);
  state.currentIndex = 0;
  if (state.flatPhases.length > 0) {
    state.timeRemaining = state.flatPhases[0].duration;
    updateThemeColor(state.flatPhases[0].color);
  }
  updateDisplay();
  saveProgram();
}

function renderSettings() {
  const body = document.getElementById('settingsBody');
  let html = '';
  state.blocks.forEach((block, bi) => {
    html += '<div class="block-card">';
    html += '<div class="block-header">';
    html += '<span class="block-label">ブロック ' + (bi + 1) + '</span>';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<div class="block-loop-wrap">ループ <input type="number" min="1" max="99" value="' +
      block.loop + '" onchange="updateBlockLoop(' + bi + ',this.value)"> 回</div>';
    html += '<button class="block-delete" onclick="removeBlock(' + bi + ')" title="ブロック削除">🗑</button>';
    html += '</div></div>';
    block.phases.forEach((phase, pi) => {
      const key = bi + '-' + pi;
      const audioName = state.audioFileNames[key] || '';
      html += '<div class="phase-card" style="--pc:' + phase.color + '">';
      html += '<div class="phase-row">';
      html += '<label>名前</label>';
      html += '<input type="text" value="' + escHtml(phase.name) + '" onchange="updatePhase(' + bi + ',' + pi + ',\'name\',this.value)">';
      html += '<input type="color" value="' + phase.color + '" onchange="updatePhase(' + bi + ',' + pi + ',\'color\',this.value);renderSettings()">';
      if (block.phases.length > 1) {
        html += '<button class="phase-delete" onclick="removePhase(' + bi + ',' + pi + ')" title="フェーズ削除">✕</button>';
      }
      html += '</div>';
      html += '<div class="phase-row">';
      html += '<label>時間</label>';
      html += '<input type="number" min="1" max="9999" value="' + phase.duration + '" onchange="updatePhase(' + bi + ',' + pi + ',\'duration\',parseInt(this.value)||1)">';
      html += '<span class="duration-display">' + formatTime(phase.duration) + '</span>';
      html += '</div>';
      html += '<div class="phase-audio-row">';
      html += '<label class="audio-upload-btn" for="audio-' + key + '">🎵 BGM選択</label>';
      html += '<input type="file" id="audio-' + key + '" accept="audio/*" style="display:none" onchange="handleAudioUpload(\'' + key + '\',this)">';
      html += '<span class="audio-file-name">' + (audioName ? '♪ ' + escHtml(audioName) : '未設定') + '</span>';
      html += '</div>';
      html += '</div>';
    });
    html += '<button class="add-phase-btn" onclick="addPhase(' + bi + ')">＋ フェーズ追加</button>';
    html += '</div>';
  });
  html += '<button class="add-block-btn" onclick="addBlock()">＋ ブロック追加</button>';
  html += '<button class="reset-default-btn" onclick="resetToDefault()">デフォルトに戻す</button>';
  body.innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updateBlockLoop(bi, val) {
  state.blocks[bi].loop = Math.max(1, parseInt(val) || 1);
  saveProgram();
}

function updatePhase(bi, pi, key, val) {
  state.blocks[bi].phases[pi][key] = val;
  saveProgram();
  if (key === 'duration') renderSettings(); // MM:SS表示更新
}

function addBlock() {
  state.blocks.push({ loop: 1, phases: [{ name: '新規フェーズ', duration: 30, color: '#888888' }] });
  saveProgram(); renderSettings();
}

function removeBlock(bi) {
  if (state.blocks.length <= 1) { alert('最低1つのブロックが必要です。'); return; }
  state.blocks.splice(bi, 1);
  saveProgram(); renderSettings();
}

function addPhase(bi) {
  state.blocks[bi].phases.push({ name: '新規', duration: 30, color: '#888888' });
  saveProgram(); renderSettings();
}

function removePhase(bi, pi) {
  state.blocks[bi].phases.splice(pi, 1);
  saveProgram(); renderSettings();
}

function handleAudioUpload(key, input) {
  if (!input.files || !input.files[0]) return;
  loadAudioFile(input.files[0], key).then(() => renderSettings());
}

function resetToDefault() {
  if (!confirm('設定をデフォルトに戻しますか？')) return;
  state.blocks = getDefaultBlocks();
  state.audioBuffers = {};
  state.audioFileNames = {};
  saveProgram(); renderSettings();
}

/* ==================== 初期化 ==================== */
function init() {
  // Wake Lock非対応チェック
  if (!('wakeLock' in navigator)) {
    document.getElementById('wake-lock-warning').classList.add('show');
  }
  // 音声合成の初期化
  if ('speechSynthesis' in window) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
  // プログラム読み込み
  state.blocks = loadProgram();
  rebuildProgram();
  // イベントリスナー
  document.getElementById('openSettingsBtn').addEventListener('click', openSettings);
  document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
  document.getElementById('btnCompleteReset').addEventListener('click', resetTimer);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
